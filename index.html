<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow Pro | Anki-GitHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        .light .glass-card { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.05); }
        .card-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 dark:bg-slate-950 dark:text-slate-200 light:bg-slate-50 light:text-slate-900">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 glass border-r border-white/10 flex flex-col p-6 gap-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 card-gradient rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="brain-circuit" class="text-white"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">StudyFlow</span>
            </div>

            <nav class="flex flex-col gap-2" id="main-nav">
                <button onclick="renderLearnView()" class="nav-item flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition group">
                    <i data-lucide="play-circle" class="group-hover:text-indigo-400"></i> Lernen
                </button>
                <button onclick="renderSemesterView()" class="nav-item flex items-center gap-3 p-3 rounded-xl bg-indigo-600/20 text-indigo-400">
                    <i data-lucide="layers"></i> Semester
                </button>
            </nav>

            <div class="mt-4 pt-4 border-t border-white/5">
                <button onclick="promptCreateSemester()" class="w-full flex items-center justify-center gap-2 p-3 rounded-xl border border-dashed border-white/20 hover:border-indigo-500 transition text-sm">
                    <i data-lucide="plus-circle" class="w-4"></i> Semester anlegen
                </button>
            </div>

            <div class="mt-auto flex flex-col gap-4">
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition">
                    <i data-lucide="sun" id="theme-icon"></i> <span id="theme-text">Light Mode</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10">
            <header class="flex justify-between items-center mb-12">
                <div id="breadcrumb">
                    <h1 id="view-title" class="text-4xl font-extrabold tracking-tight mb-2">Semester Übersicht</h1>
                    <p id="view-subtitle" class="text-slate-400">Wähle ein Semester aus, um zu lernen.</p>
                </div>
                <div id="header-actions"></div>
            </header>

            <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </main>
    </div>

    <script>
        // --- State Management ---
        let db = JSON.parse(localStorage.getItem('studyflow_db')) || { semesters: [] };
        let currentPath = { semesterId: null, moduleId: null, topicId: null };

        function save() { localStorage.setItem('studyflow_db', JSON.stringify(db)); }

        // --- Navigation & Rendering ---
        function renderSemesterView() {
            currentPath = { semesterId: null, moduleId: null, topicId: null };
            document.getElementById('view-title').innerText = "Semester";
            document.getElementById('view-subtitle').innerText = "Verwalte deine Studienabschnitte.";
            
            const grid = document.getElementById('main-grid');
            grid.innerHTML = db.semesters.map((s, idx) => `
                <div onclick="renderModuleView(${idx})" class="glass-card p-8 rounded-3xl cursor-pointer hover:border-indigo-500 transition group relative">
                    <h3 class="text-2xl font-bold mb-2 group-hover:text-indigo-400">${s.name}</h3>
                    <p class="text-slate-500 text-sm">${s.modules.length} Module hinterlegt</p>
                    <div class="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition"><i data-lucide="arrow-right"></i></div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderModuleView(sIdx) {
            currentPath.semesterId = sIdx;
            const s = db.semesters[sIdx];
            document.getElementById('view-title').innerText = s.name;
            document.getElementById('view-subtitle').innerText = "Klicke auf ein Modul.";
            
            const grid = document.getElementById('main-grid');
            grid.innerHTML = s.modules.map((m, mIdx) => `
                <div onclick="renderTopicView(${sIdx}, ${mIdx})" class="glass-card p-8 rounded-3xl cursor-pointer hover:border-purple-500 transition border-b-4 border-purple-600">
                    <h3 class="text-xl font-bold">${m.name}</h3>
                </div>
            `).join('') + `
                <div onclick="promptCreateModule(${sIdx})" class="border-2 border-dashed border-white/10 p-8 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:bg-white/5">
                    <i data-lucide="plus"></i> <span class="mt-2 text-sm">Modul hinzufügen</span>
                </div>
            `;
            lucide.createIcons();
        }

        function renderTopicView(sIdx, mIdx) {
            currentPath.moduleId = mIdx;
            const m = db.semesters[sIdx].modules[mIdx];
            document.getElementById('view-title').innerText = m.name;
            
            const grid = document.getElementById('main-grid');
            grid.innerHTML = `
                <div onclick="showAddCardModal()" class="glass-card p-8 rounded-3xl border-2 border-dashed border-indigo-500/50 flex flex-col items-center justify-center cursor-pointer">
                    <i data-lucide="plus-square" class="text-indigo-500 mb-2"></i>
                    <span class="font-bold">Neue Karte</span>
                </div>
                ${m.cards ? m.cards.map(c => `
                    <div class="glass-card p-6 rounded-2xl border-l-4 border-indigo-500">
                        <p class="font-bold mb-2 text-sm opacity-60">FRAGE:</p>
                        <p class="mb-4">${c.q}</p>
                        <div class="flex gap-1">
                            ${['1m','10m','1h','1d','3d'].map(t => `<span class="text-[10px] px-1.5 py-0.5 glass rounded">${t}</span>`).join('')}
                        </div>
                    </div>
                `).join('') : ''}
            `;
            lucide.createIcons();
        }

        function renderLearnView() {
            document.getElementById('view-title').innerText = "Lern-Modus";
            document.getElementById('view-subtitle').innerText = "Wähle deine Tags oder starte die Session.";
            document.getElementById('main-grid').innerHTML = `
                <div class="col-span-full glass-card p-20 rounded-[40px] text-center">
                    <i data-lucide="sparkles" class="w-16 h-16 mx-auto mb-6 text-indigo-500"></i>
                    <h2 class="text-3xl font-bold mb-4">Bereit zum Lernen?</h2>
                    <p class="text-slate-400 mb-8 text-lg">Du hast aktuell 12 Karten fällig.</p>
                    <button class="card-gradient px-12 py-4 rounded-2xl font-bold text-white shadow-xl shadow-indigo-500/20 hover:scale-105 transition">Jetzt Starten</button>
                </div>
            `;
            lucide.createIcons();
        }

        // --- Creator Functions ---
        function promptCreateSemester() {
            const name = prompt("Name des Semesters (z.B. WS 2024):");
            if(name) {
                db.semesters.push({ name: name, modules: [] });
                save();
                renderSemesterView();
            }
        }

        function promptCreateModule(sIdx) {
            const name = prompt("Modulname (z.B. Analysis I):");
            if(name) {
                db.semesters[sIdx].modules.push({ name: name, cards: [] });
                save();
                renderModuleView(sIdx);
            }
        }

        function showAddCardModal() {
            const q = prompt("Frage:");
            const a = prompt("Antwort:");
            if(q && a) {
                const m = db.semesters[currentPath.semesterId].modules[currentPath.moduleId];
                if(!m.cards) m.cards = [];
                m.cards.push({ q, a, nextReview: Date.now() });
                save();
                renderTopicView(currentPath.semesterId, currentPath.moduleId);
            }
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            html.classList.toggle('light');
            lucide.createIcons();
        }

        // Init
        renderSemesterView();
    </script>
</body>
</html>
