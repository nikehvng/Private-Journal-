<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Anki Pro V3.2</title>

<style>
:root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; }
.light { --bg:#f1f5f9; --card:#fff; --text:#0f172a; }

body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); }
header { display:flex; justify-content:space-between; padding:1rem; background:var(--card); }
.layout { display:flex; height:100vh; }
aside { width:260px; background:var(--card); padding:1rem; }
main { flex:1; padding:2rem; overflow:auto; }

.card { background:var(--card); padding:2rem; border-radius:12px; margin-bottom:1rem; }
.hidden { display:none; }

button {
  margin:4px; padding:8px 12px;
  border:none; border-radius:8px; cursor:pointer;
}

textarea { width:100%; height:120px; }

.progress { margin-top:10px; font-size:14px; opacity:0.8; }
</style>
</head>

<body>

<header>
<h1>🧠 Anki Pro</h1>
<button onclick="toggleTheme()">🌙/☀️</button>
</header>

<div class="layout">

<aside>
<button onclick="addSemester()">+ Semester</button>
<ul id="semesters"></ul>
</aside>

<main>

<h3 id="breadcrumb"></h3>

<div id="content"></div>

<hr>

<h2>Lernen</h2>

<div class="card">
<div id="q">Wähle ein Thema</div>
<div id="a" class="hidden"></div>
</div>

<button onclick="showAnswer()">Antwort</button><br>

<button onclick="rate(0)">❌ Schwer</button>
<button onclick="rate(1)">⚠️ Mittel</button>
<button onclick="rate(2)">✅ Leicht</button>

<div class="progress" id="progress"></div>

<hr>

<h3>KI-Import (Text oder Datei)</h3>

<input type="file" id="fileInput" accept=".txt,.md">
<br><br>

<textarea id="import"></textarea><br>
<button onclick="smartImport()">Karten generieren</button>

</main>
</div>

<script>

// ===== DATA =====
let DB = JSON.parse(localStorage.getItem("ANKI_V32")) || { semesters:[] };
let current = {semester:null,module:null,topic:null};
let studyCards = [];
let index = 0;

function save(){ localStorage.setItem("ANKI_V32", JSON.stringify(DB)); }

// ===== THEME =====
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.className);
}
document.body.className = localStorage.getItem("theme") || "";

// ===== NAV =====
function renderSemesters(){
  let el=document.getElementById("semesters");
  el.innerHTML="";
  DB.semesters.forEach((s,i)=>{
    let li=document.createElement("li");
    li.innerText=s.name;
    li.onclick=()=>selectSemester(i);
    el.appendChild(li);
  });
}

function addSemester(){
  let name=prompt("Semester:");
  if(!name) return;
  DB.semesters.push({name,modules:[]});
  save(); renderSemesters();
}

function selectSemester(i){
  current.semester=DB.semesters[i];
  current.module=null; current.topic=null;
  updateBreadcrumb(); renderModules();
}

function renderModules(){
  let c=document.getElementById("content");
  c.innerHTML="<h3>Module</h3>";

  current.semester.modules.forEach((m,i)=>{
    let b=document.createElement("button");
    b.innerText=m.name;
    b.onclick=()=>selectModule(i);
    c.appendChild(b);
  });

  let add=document.createElement("button");
  add.innerText="+ Modul";
  add.onclick=()=>{
    let name=prompt("Modul:");
    if(!name) return;
    current.semester.modules.push({name,topics:[]});
    save(); renderModules();
  };
  c.appendChild(add);
}

function selectModule(i){
  current.module=current.semester.modules[i];
  current.topic=null;
  updateBreadcrumb(); renderTopics();
}

function renderTopics(){
  let c=document.getElementById("content");
  c.innerHTML="<h3>Themen</h3>";

  current.module.topics.forEach((t,i)=>{
    let b=document.createElement("button");
    b.innerText=t.name;
    b.onclick=()=>selectTopic(i);
    c.appendChild(b);
  });

  let add=document.createElement("button");
  add.innerText="+ Thema";
  add.onclick=()=>{
    let name=prompt("Thema:");
    if(!name) return;
    current.module.topics.push({name,cards:[]});
    save(); renderTopics();
  };
  c.appendChild(add);
}

function selectTopic(i){
  current.topic=current.module.topics[i];
  updateBreadcrumb(); updateProgress(); startStudy();
}

function updateBreadcrumb(){
  document.getElementById("breadcrumb").innerText =
    `${current.semester?.name||""} > ${current.module?.name||""} > ${current.topic?.name||""}`;
}

// ===== STUDY =====
function startStudy(){
  if(!current.topic) return;

  studyCards = current.topic.cards.filter(c=>c.next <= Date.now());

  if(studyCards.length===0){
    document.getElementById("q").innerText="Keine fälligen Karten 🎉";
    document.getElementById("a").innerText="";
    return;
  }

  index=0;
  showCard();
}

function showCard(){
  let c=studyCards[index];
  document.getElementById("q").innerText=c.q;
  document.getElementById("a").innerText=c.a;
  document.getElementById("a").classList.add("hidden");
}

function showAnswer(){
  document.getElementById("a").classList.remove("hidden");
}

function rate(score){
  let c=studyCards[index];

  if(!c.ef) c.ef=2.5;
  if(!c.interval) c.interval=1;

  if(score===0){
    c.interval=1;
  } else {
    c.ef += (0.1 - (2-score)*(0.08 + (2-score)*0.02));
    if(c.ef<1.3) c.ef=1.3;
    c.interval = Math.round(c.interval * c.ef);
  }

  c.next = Date.now() + c.interval * 86400000;

  index++;
  if(index>=studyCards.length) startStudy();
  else showCard();

  save();
  updateProgress();
}

// ===== PROGRESS =====
function updateProgress(){
  if(!current.topic) return;
  let total=current.topic.cards.length;
  let due=current.topic.cards.filter(c=>c.next <= Date.now()).length;
  document.getElementById("progress").innerText =
    `Karten: ${total} | Fällig: ${due}`;
}

// ===== FILE IMPORT =====
document.getElementById("fileInput").addEventListener("change", function(){
  let file=this.files[0];
  if(!file) return;

  let reader=new FileReader();
  reader.onload=function(e){
    document.getElementById("import").value = e.target.result;
  };
  reader.readAsText(file);
});

// ===== SMART KI IMPORT =====
function smartImport(){
  if(!current.topic){
    alert("Wähle zuerst ein Thema!");
    return;
  }

  let text=document.getElementById("import").value;

  // Split smarter
  let blocks=text.split(/\n|\.\s/);

  blocks.forEach(b=>{
    b=b.trim();
    if(b.length<15) return;

    if(b.includes("?")){
      let [q,...rest]=b.split("?");
      addCard(q+"?", rest.join("?"));
    }
    else if(b.includes(":")){
      let [q,a]=b.split(":");
      addCard(q, a);
    }
    else {
      // heuristische KI
      let mid=Math.floor(b.length/2);
      addCard(b.slice(0,mid), b.slice(mid));
    }
  });

  save();
  updateProgress();
  alert("KI-Import fertig 🚀");
}

function addCard(q,a){
  current.topic.cards.push({
    q:q.trim(),
    a:a.trim(),
    next:Date.now(),
    interval:1,
    ef:2.5
  });
}

// ===== INIT =====
renderSemesters();

</script>

</body>
</html>
