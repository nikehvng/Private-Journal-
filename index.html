<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow | Next-Gen Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .light .glass { background: rgba(0, 0, 0, 0.02); border: 1px solid rgba(0, 0, 0, 0.05); }
        .card-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0f172a', lightBg: '#f8fafc' } } }
        }
    </script>
</head>
<body class="bg-darkBg text-slate-200 dark:bg-darkBg dark:text-slate-200 light:bg-lightBg light:text-slate-800 transition-all">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 glass border-r flex flex-col p-6 gap-8">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 card-gradient rounded-xl flex items-center justify-center">
                    <i data-lucide="brain-circuit" class="text-white"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">StudyFlow</span>
            </div>

            <nav class="flex flex-col gap-2">
                <button onclick="showSection('learn')" class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition group">
                    <i data-lucide="play-circle" class="group-hover:text-indigo-400"></i> Lernen
                </button>
                <button onclick="showSection('semesters')" class="flex items-center gap-3 p-3 rounded-lg bg-indigo-600/20 text-indigo-400">
                    <i data-lucide="layers"></i> Semester
                </button>
                <button class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition mt-10">
                    <i data-lucide="plus-circle"></i> Neues Semester
                </button>
            </nav>

            <div class="mt-auto flex flex-col gap-4">
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition">
                    <i data-lucide="sun" id="theme-icon"></i> <span id="theme-text">Light Mode</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 id="view-title" class="text-3xl font-bold">1. Semester</h1>
                    <p class="text-slate-400">Deine Module im Überblick</p>
                </div>
                <div class="flex gap-4">
                    <button class="px-4 py-2 glass rounded-lg flex items-center gap-2 hover:border-indigo-500 transition">
                        <i data-lucide="file-up" class="w-4"></i> NotebookLM Import
                    </button>
                </div>
            </header>

            <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div onclick="drillDown('Mathematik')" class="glass p-6 rounded-2xl cursor-pointer hover:scale-[1.02] transition-transform border-b-4 border-indigo-500">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-indigo-500/20 rounded-lg text-indigo-400">
                            <i data-lucide="function-square"></i>
                        </div>
                        <span class="text-xs font-mono opacity-50">12 Themen</span>
                    </div>
                    <h3 class="text-xl font-semibold mb-2">Mathematik I</h3>
                    <div class="w-full bg-white/10 h-1.5 rounded-full mt-4">
                        <div class="bg-indigo-500 h-1.5 rounded-full" style="width: 45%"></div>
                    </div>
                </div>

                <div onclick="drillDown('Informatik')" class="glass p-6 rounded-2xl cursor-pointer hover:scale-[1.02] transition-transform border-b-4 border-purple-500">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-purple-500/20 rounded-lg text-purple-400">
                            <i data-lucide="code-2"></i>
                        </div>
                        <span class="text-xs font-mono opacity-50">8 Themen</span>
                    </div>
                    <h3 class="text-xl font-semibold mb-2">Grundlagen Informatik</h3>
                    <div class="w-full bg-white/10 h-1.5 rounded-full mt-4">
                        <div class="bg-purple-500 h-1.5 rounded-full" style="width: 70%"></div>
                    </div>
                </div>
            </div>

            <div id="card-editor" class="hidden mt-10">
                <div class="glass p-8 rounded-3xl max-w-2xl mx-auto border-indigo-500/30 border-2">
                    <h2 class="text-2xl font-bold mb-6">Neue Karte erstellen</h2>
                    <div class="space-y-4">
                        <textarea class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:ring-2 ring-indigo-500 outline-none" placeholder="Vorderseite (Frage)..."></textarea>
                        <textarea class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:ring-2 ring-indigo-500 outline-none" rows="4" placeholder="Rückseite (Antwort)..."></textarea>
                        
                        <div class="grid grid-cols-5 gap-2 text-center text-xs">
                            <div class="p-2 glass rounded border-indigo-500/50">1m</div>
                            <div class="p-2 glass rounded">10m</div>
                            <div class="p-2 glass rounded">1h</div>
                            <div class="p-2 glass rounded">1d</div>
                            <div class="p-2 glass rounded">3d</div>
                        </div>
                        
                        <div class="flex gap-4 pt-4">
                            <button class="flex-1 bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-500 transition">Speichern</button>
                            <button onclick="toggleEditor()" class="px-6 py-3 glass rounded-xl">Abbrechen</button>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();

        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                icon.setAttribute('data-lucide', 'moon');
                text.innerText = 'Dark Mode';
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                icon.setAttribute('data-lucide', 'sun');
                text.innerText = 'Light Mode';
            }
            lucide.createIcons();
        }

        function drillDown(name) {
            document.getElementById('view-title').innerText = name;
            // Hier würde normalerweise das Rendering der Themen-Boxen folgen
            document.getElementById('content-grid').innerHTML = `
                <div onclick="toggleEditor()" class="glass border-dashed border-2 border-indigo-500/50 p-10 rounded-2xl flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-indigo-500/10 transition">
                    <i data-lucide="plus" class="w-10 h-10"></i>
                    <span class="font-bold text-indigo-400">Neue Karte erstellen</span>
                </div>
            `;
            lucide.createIcons();
        }

        function toggleEditor() {
            const grid = document.getElementById('content-grid');
            const editor = document.getElementById('card-editor');
            grid.classList.toggle('hidden');
            editor.classList.toggle('hidden');
        }
    </script>
</body>
</html>
