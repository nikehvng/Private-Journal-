<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Anki Pro FINAL</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --border:#334155;
}

.light {
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --border:#cbd5e1;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header {
  display:flex;
  justify-content:space-between;
  padding:1rem;
  background:var(--card);
  border-bottom:1px solid var(--border);
}

.layout {
  display:flex;
  height:100vh;
}

aside {
  width:280px;
  background:var(--card);
  padding:1rem;
  border-right:1px solid var(--border);
  overflow:auto;
}

main {
  flex:1;
  padding:2rem;
  overflow:auto;
}

button {
  margin:4px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--border);
  color:var(--text);
}

textarea, input {
  width:100%;
  padding:8px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

.card {
  background:var(--card);
  padding:2rem;
  border-radius:12px;
  margin-bottom:1rem;
  border:1px solid var(--border);
}

.hidden { display:none; }

/* Sidebar */
.sidebar-item {
  margin:6px 0;
  cursor:pointer;
  user-select:none;
}

.nested {
  margin-left:14px;
  display:none;
}

.active {
  display:block;
}

.cardItem {
  border:1px solid var(--border);
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>🧠 Anki Pro</h1>
<button onclick="toggleTheme()">🌙/☀️</button>
</header>

<div class="layout">

<aside>
<button onclick="addSemester()">+ Semester</button>
<div id="semesters"></div>
</aside>

<main>

<h3 id="breadcrumb"></h3>

<div class="card">
<div id="q">Wähle ein Thema</div>
<div id="a" class="hidden"></div>
</div>

<button onclick="showAnswer()">Antwort</button><br>

<button onclick="rate(0)">❌ Schwer</button>
<button onclick="rate(1)">⚠️ Mittel</button>
<button onclick="rate(2)">✅ Leicht</button>

<div id="progress"></div>

<hr>

<h3>Karten</h3>
<div id="cardList"></div>

<hr>

<h3>KI Import (Text / Datei)</h3>
<input type="file" id="fileInput" accept=".txt,.md"><br><br>
<textarea id="import"></textarea>
<button onclick="smartImport()">Import</button>

</main>
</div>

<script>

// ================= DATA =================
let DB = JSON.parse(localStorage.getItem("ANKI_FINAL")) || { semesters:[] };

let current = {semester:null,module:null,topic:null};
let studyCards = [];
let index = 0;

function save(){
  localStorage.setItem("ANKI_FINAL", JSON.stringify(DB));
  renderSemesters();
}

// ================= THEME =================
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.className);
}
document.body.className = localStorage.getItem("theme") || "";

// ================= SIDEBAR =================
function renderSemesters(){
  const el = document.getElementById("semesters");
  el.innerHTML = "";

  DB.semesters.forEach((s) => {

    const sem = document.createElement("div");

    const semBtn = document.createElement("div");
    semBtn.className = "sidebar-item";
    semBtn.innerText = "📚 " + s.name;

    const moduleBox = document.createElement("div");
    moduleBox.className = "nested";

    semBtn.onclick = () => moduleBox.classList.toggle("active");

    s.modules.forEach((m) => {

      const modBtn = document.createElement("div");
      modBtn.className = "sidebar-item";
      modBtn.innerText = "📦 " + m.name;

      const topicBox = document.createElement("div");
      topicBox.className = "nested";

      modBtn.onclick = (e) => {
        e.stopPropagation();
        topicBox.classList.toggle("active");
      };

      m.topics.forEach((t) => {

        const tBtn = document.createElement("div");
        tBtn.className = "sidebar-item";
        tBtn.innerText = "🧠 " + t.name;

        tBtn.onclick = (e) => {
          e.stopPropagation();

          current.semester = s;
          current.module = m;
          current.topic = t;

          updateBreadcrumb();
          renderCardList();
          updateProgress();
          startStudy();
        };

        topicBox.appendChild(tBtn);
      });

      moduleBox.appendChild(modBtn);
      moduleBox.appendChild(topicBox);
    });

    sem.appendChild(semBtn);
    sem.appendChild(moduleBox);

    el.appendChild(sem);
  });
}

// ================= STRUCTURE =================
function addSemester(){
  let name = prompt("Semester:");
  if(!name) return;
  DB.semesters.push({name,modules:[]});
  save();
}

// ================= STUDY =================
function startStudy(){
  if(!current.topic) return;

  studyCards = current.topic.cards.filter(c => c.next <= Date.now());

  if(studyCards.length === 0){
    document.getElementById("q").innerText = "Keine fälligen Karten 🎉";
    return;
  }

  index = 0;
  showCard();
}

function showCard(){
  let c = studyCards[index];
  document.getElementById("q").innerText = c.q;
  document.getElementById("a").innerText = c.a;
  document.getElementById("a").classList.add("hidden");
}

function showAnswer(){
  document.getElementById("a").classList.remove("hidden");
}

function rate(score){
  let c = studyCards[index];

  if(score === 0) c.interval = 1;
  else c.interval = Math.max(1, (c.interval || 1) * 2);

  c.next = Date.now() + c.interval * 86400000;

  index++;
  if(index >= studyCards.length) startStudy();
  else showCard();

  save();
  updateProgress();
}

// ================= CARDS =================
function renderCardList(){
  let el = document.getElementById("cardList");
  el.innerHTML = "";

  current.topic.cards.forEach((c,i) => {

    let div = document.createElement("div");
    div.className = "cardItem";

    div.innerHTML = `
      <b>${c.q}</b><br>${c.a}<br>
      <button onclick="editCard(${i})">✏️</button>
      <button onclick="deleteCard(${i})">🗑️</button>
    `;

    el.appendChild(div);
  });
}

function editCard(i){
  let c = current.topic.cards[i];
  let q = prompt("Frage:", c.q);
  let a = prompt("Antwort:", c.a);

  if(q && a){
    c.q = q;
    c.a = a;
    save();
    renderCardList();
  }
}

function deleteCard(i){
  if(confirm("Löschen?")){
    current.topic.cards.splice(i,1);
    save();
    renderCardList();
  }
}

// ================= PROGRESS =================
function updateProgress(){
  let total = current.topic.cards.length;
  let due = current.topic.cards.filter(c => c.next <= Date.now()).length;

  document.getElementById("progress").innerText =
    `${due} fällig / ${total} Karten`;
}

// ================= IMPORT =================
document.getElementById("fileInput").addEventListener("change", function(){
  let reader = new FileReader();
  reader.onload = e => {
    document.getElementById("import").value = e.target.result;
  };
  reader.readAsText(this.files[0]);
});

function smartImport(){
  if(!current.topic){
    alert("Thema wählen!");
    return;
  }

  let text = document.getElementById("import").value;
  let lines = text.split("\n");

  lines.forEach(l => {
    if(l.length < 10) return;

    if(l.includes("?")){
      let [q,a] = l.split("?");
      addCard(q+"?", a);
    }
    else if(l.includes(":")){
      let [q,a] = l.split(":");
      addCard(q,a);
    }
  });

  save();
  renderCardList();
  updateProgress();
}

function addCard(q,a){
  current.topic.cards.push({
    q:q.trim(),
    a:a.trim(),
    next:Date.now(),
    interval:1
  });
}

// ================= INIT =================
renderSemesters();

</script>

</body>
</html>
