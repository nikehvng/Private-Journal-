<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Anki System FINAL SAFE</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --border:#334155;
  --input:#0b1220;
}

.light {
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --border:#cbd5e1;
  --input:#ffffff;
}

body {
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  background:var(--bg);
  color:var(--text);
}

aside {
  width:280px;
  background:var(--card);
  padding:10px;
  overflow:auto;
  border-right:1px solid var(--border);
}

main {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* FIX: Buttons */
button {
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:var(--border);
  color:var(--text);
}

/* 🔥 FIX: Inputs + Textareas (Hauptproblem) */
input, textarea {
  width:100%;
  margin:5px 0;
  padding:6px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  outline:none;
}

input:focus, textarea:focus {
  border:1px solid #60a5fa;
}

/* Cards */
.card {
  background:var(--card);
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid var(--border);
}

/* Sidebar Items */
.item {
  cursor:pointer;
  margin:5px 0;
  padding:5px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
}

.small { font-size:12px; opacity:0.8; }

.hidden { display:none; }
</style>
</head>

<body>

<aside>
<button onclick="addSemester()">+ Semester</button>
<div id="nav"></div>
</aside>

<main>

<h2 id="path">Kein Thema gewählt</h2>

<div class="card">
<div id="q">Wähle ein Thema</div>
<div id="a" class="hidden"></div>
</div>

<button onclick="showAnswer()">Antwort</button>
<button onclick="rate(0)">Schlecht</button>
<button onclick="rate(1)">OK</button>
<button onclick="rate(2)">Gut</button>

<div id="progress"></div>

<hr>

<h3>Karten im Thema</h3>
<div id="cards"></div>

<hr>

<h3>Neue Karte</h3>
<input id="qInput" placeholder="Frage">
<input id="aInput" placeholder="Antwort">
<button onclick="addCard()">Karte erstellen</button>

<hr>

<h3>Import (Text / Datei)</h3>
<input type="file" id="fileInput" accept=".txt,.md">
<textarea id="import"></textarea>
<button onclick="smartImport()">Import</button>

<hr>

<button onclick="toggleTheme()">🌙 / ☀️ Theme</button>

</main>

<script>

// ================= DATA =================
let DB = JSON.parse(localStorage.getItem("anki_full")) || { semesters:[] };

let current = {semester:null,module:null,topic:null};
let study = [];
let index = 0;

// ================= SAVE =================
function save(){
  localStorage.setItem("anki_full", JSON.stringify(DB));
  render();
}

// ================= THEME =================
function toggleTheme(){
  document.body.classList.toggle("light");
}

// ================= NAV =================
function render(){
  let nav = document.getElementById("nav");
  nav.innerHTML = "";

  DB.semesters.forEach((s)=>{

    if(!s.modules) s.modules=[];
    let sDiv = document.createElement("div");
    sDiv.className="item";
    sDiv.innerText="📚 "+s.name;

    let modBox = document.createElement("div");
    modBox.style.display="none";

    sDiv.onclick=()=>modBox.style.display = modBox.style.display==="none"?"block":"none";

    s.modules.forEach((m)=>{

      if(!m.topics) m.topics=[];
      let mDiv=document.createElement("div");
      mDiv.className="item";
      mDiv.innerText="📦 "+m.name;

      let topicBox=document.createElement("div");
      topicBox.style.display="none";

      mDiv.onclick=(e)=>{
        e.stopPropagation();
        topicBox.style.display = topicBox.style.display==="none"?"block":"none";
      };

      m.topics.forEach((t)=>{

        let tDiv=document.createElement("div");
        tDiv.className="item";
        tDiv.innerText="🧠 "+t.name;

        tDiv.onclick=()=>{
          current.semester=s;
          current.module=m;
          current.topic=t;
          update();
        };

        topicBox.appendChild(tDiv);
      });

      let addT=document.createElement("button");
      addT.innerText="+ Thema";
      addT.onclick=()=>{
        let name=prompt("Thema:");
        if(!name) return;
        m.topics.push({name,cards:[]});
        save();
      };

      topicBox.appendChild(addT);

      modBox.appendChild(mDiv);
      modBox.appendChild(topicBox);
    });

    let addM=document.createElement("button");
    addM.innerText="+ Modul";
    addM.onclick=()=>{
      let name=prompt("Modul:");
      if(!name) return;
      s.modules.push({name,topics:[]});
      save();
    };

    document.getElementById("nav").appendChild(sDiv);
    document.getElementById("nav").appendChild(modBox);
    document.getElementById("nav").appendChild(addM);
  });
}

// ================= CREATE =================
function addSemester(){
  let name=prompt("Semester:");
  if(!name) return;
  DB.semesters.push({name,modules:[]});
  save();
}

// ================= UPDATE =================
function update(){
  document.getElementById("path").innerText =
  `${current.semester.name} > ${current.module.name} > ${current.topic.name}`;

  renderCards();
  startStudy();
  updateProgress();
}

// ================= CARDS / STUDY / IMPORT =================
// (unverändert – absichtlich nicht angefasst)

function addCard(){
  if(!current.topic) return alert("Kein Thema");

  let q=document.getElementById("qInput").value;
  let a=document.getElementById("aInput").value;

  if(!q||!a) return;

  current.topic.cards.push({q,a,next:0,interval:1});

  document.getElementById("qInput").value="";
  document.getElementById("aInput").value="";

  save();
  renderCards();
}

function renderCards(){
  let el=document.getElementById("cards");
  el.innerHTML="";
  if(!current.topic) return;

  current.topic.cards.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <b>${c.q}</b><br>${c.a}
      <br>
      <button onclick="edit(${i})">✏️</button>
      <button onclick="del(${i})">🗑️</button>
    `;
    el.appendChild(div);
  });
}

function edit(i){
  let c=current.topic.cards[i];
  let q=prompt("Frage:",c.q);
  let a=prompt("Antwort:",c.a);
  if(q&&a){
    c.q=q;
    c.a=a;
    save();
    renderCards();
  }
}

function del(i){
  current.topic.cards.splice(i,1);
  save();
  renderCards();
}

function startStudy(){
  if(!current.topic) return;
  study=current.topic.cards;
  index=0;
  show();
}

function show(){
  let c=study[index];
  document.getElementById("q").innerText=c.q;
  document.getElementById("a").innerText=c.a;
  document.getElementById("a").classList.add("hidden");
}

function showAnswer(){
  document.getElementById("a").classList.remove("hidden");
}

function rate(v){
  let c=study[index];
  if(v===0) c.interval=1;
  else c.interval=(c.interval||1)*2;
  c.next=Date.now()+c.interval*86400000;

  index++;
  if(index>=study.length) startStudy();
  else show();

  save();
  updateProgress();
}

function updateProgress(){
  if(!current.topic) return;
  let total=current.topic.cards.length;
  let due=current.topic.cards.filter(c=>c.next<=Date.now()).length;
  document.getElementById("progress").innerText =
  `${due} fällig / ${total} Karten`;
}

// IMPORT bleibt unverändert
document.getElementById("fileInput").addEventListener("change", function(){
  let r=new FileReader();
  r.onload=e=>{
    document.getElementById("import").value=e.target.result;
  };
  r.readAsText(this.files[0]);
});

function smartImport(){
  if(!current.topic) return;
  let text=document.getElementById("import").value;
  text.split("\n").forEach(l=>{
    if(l.includes("?")){
      let [q,a]=l.split("?");
      current.topic.cards.push({q:q+"?",a,a,next:0,interval:1});
    }
  });
  save();
  renderCards();
}

// ================= INIT =================
render();

</script>

</body>
</html>
