<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Anki System Level 3.5 PRO</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --border:#334155;
}

.light {
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --border:#cbd5e1;
}

body {
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  background:var(--bg);
  color:var(--text);
}

aside {
  width:300px;
  background:var(--card);
  padding:10px;
  overflow:auto;
  border-right:1px solid var(--border);
}

main {
  flex:1;
  padding:20px;
  overflow:auto;
}

button {
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:var(--border);
  color:var(--text);
}

input, textarea {
  width:100%;
  margin:5px 0;
  padding:6px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

.card {
  background:var(--card);
  padding:16px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid var(--border);
  cursor:grab;
}

.item {
  cursor:pointer;
  margin:5px 0;
  padding:5px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
}

.hidden { display:none; }

.tag {
  display:inline-block;
  padding:2px 6px;
  margin:2px;
  border:1px solid var(--border);
  border-radius:6px;
  font-size:12px;
}

/* Heatmap */
.heat {
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:4px;
}
.cell {
  height:12px;
  background:#334155;
  border-radius:2px;
}
.cell.active { background:#22c55e; }
</style>
</head>

<body>

<aside>
<button onclick="addSemester()">+ Semester</button>
<button onclick="startDashboard()">📌 Lernen</button>
<button onclick="toggleExamMode()">🎯 Prüfungsmodus</button>
<div id="nav"></div>

<hr>

<h4>🔎 Suche</h4>
<input id="search" placeholder="Suche Karten..." oninput="renderCards()">

<hr>

<h4>📊 Heatmap</h4>
<div id="heatmap" class="heat"></div>

<hr>

<h4>🎯 Ziel</h4>
<div id="goal"></div>

</aside>

<main>

<h2 id="path">Dashboard</h2>

<div class="card" onclick="flipCard()" id="studyCard">
  <div id="q">Start</div>
  <div id="a" class="hidden"></div>
</div>

<button onclick="rate(0)">Again</button>
<button onclick="rate(3)">Good</button>
<button onclick="rate(5)">Easy</button>

<div id="progress"></div>

<hr>

<h3>Scheduler Timeline</h3>
<div id="schedule"></div>

<hr>

<h3>🏷️ Tags</h3>
<input id="tagFilter">
<div id="tagButtons"></div>
<button onclick="startDashboard()">Filter</button>

<hr>

<h3>Karten</h3>
<div id="cards"></div>

<hr>

<h3>Neue Karte</h3>
<input id="qInput">
<input id="aInput">
<input id="tagInput">
<button onclick="addCard()">Erstellen</button>

</main>

<script>

const DB_KEY = "anki_pro_35";

let State = {
  session: [],
  index: 0,
  flipped: false,
  examMode: false,
  goalPerDay: 20
};

function loadDB(){
  let db = JSON.parse(localStorage.getItem(DB_KEY));
  if(!db) return { semesters: [] };

  db.semesters ||= [];

  db.semesters.forEach(s=>{
    s.modules ||= [];
    s.modules.forEach(m=>{
      m.topics ||= [];
      m.topics.forEach(t=>{
        t.cards ||= [];
        t.cards.forEach(c=>{
          c.tags ||= [];
          c.next ||= Date.now();
          c.interval ||= 1;
          c.ease ||= 2.5;
        });
      });
    });
  });

  return db;
}

let DB = loadDB();

function save(){
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
  render();
  renderTags();
  renderHeatmap();
  renderSchedule();
  renderGoal();
}

/* ================= UTIL ================= */

function allCards(){
  const out=[];
  for(const s of DB.semesters){
    for(const m of (s.modules||[])){
      for(const t of (m.topics||[])){
        for(const c of (t.cards||[])){
          out.push(c);
        }
      }
    }
  }
  return out;
}

/* ================= SEARCH ================= */

function searchCards(list){
  const q = document.getElementById("search").value.toLowerCase();
  if(!q) return list;
  return list.filter(c => (c.q + c.a).toLowerCase().includes(q));
}

/* ================= DRAG & DROP ================= */

let dragged=null;

function enableDrag(){
  document.querySelectorAll(".card").forEach(el=>{
    el.draggable=true;

    el.ondragstart=()=> dragged=el.dataset.id;

    el.ondragover=e=>e.preventDefault();

    el.ondrop=()=>{
      let arr = State.session;
      let from = arr.findIndex(c=>c.id===dragged);
      let to = arr.findIndex(c=>c.id===el.dataset.id);
      if(from>-1 && to>-1){
        let tmp = arr[from];
        arr[from]=arr[to];
        arr[to]=tmp;
        renderCards();
      }
    };
  });
}

/* ================= DASHBOARD ================= */

function startDashboard(){
  const now=Date.now();

  const tags=(document.getElementById("tagFilter").value||"")
    .split(",").map(x=>x.trim()).filter(Boolean);

  State.session = searchCards(allCards()).filter(c=>{
    const tagOk = tags.length===0 || tags.some(t=>c.tags.includes(t));
    return c.next<=now && tagOk;
  });

  State.index=0;
  showCard();
}

/* ================= CARD ================= */

function showCard(){
  const c = State.session[State.index];

  if(!c){
    document.getElementById("q").innerText="Fertig 🎉";
    document.getElementById("a").classList.add("hidden");
    return;
  }

  document.getElementById("q").innerText=c.q;
  document.getElementById("a").innerText=c.a;
  document.getElementById("a").classList.add("hidden");

  updateProgress();
}

/* ================= FLIP ================= */

function flipCard(){
  document.getElementById("a").classList.toggle("hidden");
}

/* ================= SM2 ================= */

function review(c,q){
  if(q<3) c.interval=1;
  else {
    c.interval = Math.round(c.interval*c.ease);
    c.ease = Math.max(1.3,c.ease+(0.1-(5-q)*0.02));
  }
  c.next=Date.now()+c.interval*86400000;
}

/* ================= RATE ================= */

function rate(v){
  const c=State.session[State.index];
  if(!c) return;

  review(c,v);
  State.index++;

  save();
  showCard();
}

/* ================= PROGRESS ================= */

function updateProgress(){
  document.getElementById("progress").innerText =
    `${State.session.length-State.index} übrig`;
}

/* ================= TAGS ================= */

function renderTags(){
  const el=document.getElementById("tagButtons");
  el.innerHTML="";
  const set=new Set();

  allCards().forEach(c=>c.tags.forEach(t=>set.add(t)));

  set.forEach(t=>{
    const b=document.createElement("button");
    b.className="tag";
    b.innerText=t;
    b.onclick=()=> {
      document.getElementById("tagFilter").value=t;
      startDashboard();
    };
    el.appendChild(b);
  });
}

/* ================= CARDS ================= */

function renderCards(){
  const el=document.getElementById("cards");
  el.innerHTML="";

  let list = searchCards(allCards());

  list.forEach(c=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.id=c.id;
    div.innerHTML=`<b>${c.q}</b><br>${c.a}<br>${(c.tags||[]).join(", ")}`;
    el.appendChild(div);
  });

  enableDrag();
}

/* ================= HEATMAP ================= */

function renderHeatmap(){
  const el=document.getElementById("heatmap");
  el.innerHTML="";

  for(let i=0;i<28;i++){
    const d=document.createElement("div");
    d.className="cell";
    if(Math.random()>0.7) d.classList.add("active");
    el.appendChild(d);
  }
}

/* ================= GOAL ================= */

function renderGoal(){
  document.getElementById("goal").innerText =
    `Ziel: ${State.goalPerDay} Karten/Tag`;
}

/* ================= SCHEDULER ================= */

function renderSchedule(){
  const el=document.getElementById("schedule");
  el.innerHTML="";

  allCards()
    .sort((a,b)=>a.next-b.next)
    .slice(0,10)
    .forEach(c=>{
      const d=document.createElement("div");
      d.className="item";
      d.innerText=`${c.q} → ${new Date(c.next).toLocaleDateString()}`;
      el.appendChild(d);
    });
}

/* ================= EXAM MODE ================= */

function toggleExamMode(){
  State.examMode=!State.examMode;
  alert(State.examMode?"Prüfungsmodus AN":"AUS");
}

/* ================= ADD ================= */

function addCard(){
  const q=document.getElementById("qInput").value;
  const a=document.getElementById("aInput").value;
  const tags=document.getElementById("tagInput").value;

  DB.semesters.forEach(s=>{
    s.modules?.forEach(m=>{
      m.topics?.forEach(t=>{
        t.cards.push({
          id:crypto.randomUUID(),
          q,a,
          tags:tags.split(",").map(x=>x.trim()),
          next:Date.now(),
          interval:1,
          ease:2.5
        });
      });
    });
  });

  save();
}

/* ================= INIT ================= */

render();
renderTags();
renderHeatmap();
renderSchedule();
renderGoal();

</script>

</body>
</html>
