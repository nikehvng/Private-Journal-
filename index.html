<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Anki System FINAL SAFE</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --border:#334155;
}

.light {
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --border:#cbd5e1;
}

body {
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  background:var(--bg);
  color:var(--text);
}

aside {
  width:280px;
  background:var(--card);
  padding:10px;
  overflow:auto;
  border-right:1px solid var(--border);
}

main {
  flex:1;
  padding:20px;
  overflow:auto;
}

button {
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:var(--border);
  color:var(--text);
}

input, textarea {
  width:100%;
  margin:5px 0;
  padding:6px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

.card {
  background:var(--card);
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid var(--border);
}

.item {
  cursor:pointer;
  margin:5px 0;
  padding:5px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
}

.hidden { display:none; }
</style>
</head>

<body>

<aside>
<button onclick="addSemester()">+ Semester</button>
<button onclick="showDue()">📌 Dashboard Lernen</button>
<div id="nav"></div>
</aside>

<main>

<h2 id="path">Dashboard</h2>

<div class="card">
<div id="q">Wähle „Dashboard Lernen“</div>
<div id="a" class="hidden"></div>
</div>

<button onclick="showAnswer()">Antwort</button>
<button onclick="rate(0)">Schlecht</button>
<button onclick="rate(1)">OK</button>
<button onclick="rate(2)">Gut</button>

<div id="progress"></div>

<hr>

<h3>🏷️ Tag Filter</h3>
<input id="tagFilter" placeholder="z.B. bio,prüfung,lernen">
<button onclick="showDue()">Filter anwenden</button>

<hr>

<h3>Karten (nur Strukturansicht)</h3>
<div id="cards"></div>

<hr>

<h3>Neue Karte</h3>
<input id="qInput" placeholder="Frage">
<input id="aInput" placeholder="Antwort">
<button onclick="addCard()">Karte erstellen</button>

<hr>

<h3>Import</h3>
<textarea id="import"></textarea>
<button onclick="smartImport()">Import</button>

<hr>

<button onclick="toggleTheme()">🌙 / ☀️ Theme</button>

</main>

<script>

// ================= DATA =================
const SCHEMA_VERSION = 1;

function createDB(){
  return { version: SCHEMA_VERSION, semesters: [] };
}

function loadDB(){
  let raw = localStorage.getItem("anki_full");
  if(!raw) return createDB();

  let db;
  try { db = JSON.parse(raw); } catch { return createDB(); }

  if(!db.version) db.version = 0;

  db.semesters = db.semesters || [];

  db.semesters.forEach(s=>{
    if(!s.modules) s.modules=[];
    s.modules.forEach(m=>{
      if(!m.topics) m.topics=[];
      m.topics.forEach(t=>{
        if(!t.cards) t.cards=[];
        t.cards.forEach(c=>{
          if(!c.id) c.id = crypto.randomUUID();
          if(!c.interval) c.interval = 1;
          if(!c.next) c.next = Date.now();
          if(!c.tags) c.tags = [];
        });
      });
    });
  });

  db.version = SCHEMA_VERSION;
  localStorage.setItem("anki_full", JSON.stringify(db));
  return db;
}

let DB = loadDB();

let current = {semester:null,module:null,topic:null};
let study = [];
let index = 0;

// ================= SAVE =================
function save(){
  localStorage.setItem("anki_full", JSON.stringify(DB));
  render();
}

// ================= THEME =================
function toggleTheme(){
  document.body.classList.toggle("light");
}

// ================= NAV =================
function render(){
  let nav = document.getElementById("nav");
  nav.innerHTML = "";

  DB.semesters.forEach((s)=>{

    if(!s.modules) s.modules=[];

    let sDiv=document.createElement("div");
    sDiv.className="item";
    sDiv.innerText="📚 "+s.name;

    let modBox=document.createElement("div");
    modBox.style.display="none";

    sDiv.onclick=()=>modBox.style.display =
      modBox.style.display==="none"?"block":"none";

    s.modules.forEach((m)=>{

      if(!m.topics) m.topics=[];

      let mDiv=document.createElement("div");
      mDiv.className="item";
      mDiv.innerText="📦 "+m.name;

      mDiv.ondblclick=()=>{
        let n=prompt("Modul:",m.name);
        if(n){ m.name=n; save(); }
      };

      let delM=document.createElement("button");
      delM.innerText="🗑️";
      delM.onclick=(e)=>{
        e.stopPropagation();
        s.modules = s.modules.filter(x=>x!==m);
        save();
      };

      mDiv.appendChild(delM);

      let topicBox=document.createElement("div");
      topicBox.style.display="none";

      mDiv.onclick=(e)=>{
        e.stopPropagation();
        topicBox.style.display =
          topicBox.style.display==="none"?"block":"none";
      };

      m.topics.forEach((t)=>{

        if(!t.cards) t.cards=[];

        let tDiv=document.createElement("div");
        tDiv.className="item";
        tDiv.innerText="🧠 "+t.name;

        tDiv.ondblclick=()=>{
          let n=prompt("Thema:",t.name);
          if(n){ t.name=n; save(); }
        };

        let delT=document.createElement("button");
        delT.innerText="🗑️";
        delT.onclick=(e)=>{
          e.stopPropagation();
          m.topics = m.topics.filter(x=>x!==t);
          save();
        };

        tDiv.appendChild(delT);

        tDiv.onclick=()=>{
          current.semester=s;
          current.module=m;
          current.topic=t;
          update();
        };

        topicBox.appendChild(tDiv);
      });

      let addT=document.createElement("button");
      addT.innerText="+ Thema";
      addT.onclick=()=>{
        let name=prompt("Thema:");
        if(!name) return;
        m.topics.push({name,cards:[]});
        save();
      };

      topicBox.appendChild(addT);

      modBox.appendChild(mDiv);
      modBox.appendChild(topicBox);
    });

    let addM=document.createElement("button");
    addM.innerText="+ Modul";
    addM.onclick=()=>{
      let name=prompt("Modul:");
      if(!name) return;
      s.modules.push({name,topics:[]});
      save();
    };

    document.getElementById("nav").appendChild(sDiv);
    document.getElementById("nav").appendChild(modBox);
    document.getElementById("nav").appendChild(addM);
  });
}

// ================= SEMESTER =================
function addSemester(){
  let name=prompt("Semester:");
  if(!name) return;
  DB.semesters.push({name,modules:[]});
  save();
}

// ================= UPDATE =================
function update(){
  document.getElementById("path").innerText = "Dashboard Lernen";
  renderCards();
  buildStudyQueue();
  updateProgress();
}

// ================= ADD CARD =================
function addCard(){
  if(!current.topic) return alert("Thema wählen");

  let q=document.getElementById("qInput").value;
  let a=document.getElementById("aInput").value;
  let tags=prompt("Tags (kommagetrennt)", "");

  current.topic.cards.push({
    id: crypto.randomUUID(),
    q,a,
    tags: tags ? tags.split(",").map(t=>t.trim()) : [],
    interval:1,
    next:Date.now()
  });

  save();
  renderCards();
}

// ================= CARDS =================
function renderCards(){
  let el=document.getElementById("cards");
  el.innerHTML="";

  DB.semesters.forEach(s=>{
    (s.modules||[]).forEach(m=>{
      (m.topics||[]).forEach(t=>{
        (t.cards||[]).forEach(c=>{
          let div=document.createElement("div");
          div.className="card";
          div.innerHTML = `<b>${c.q}</b><br>${c.a}<br>${(c.tags||[]).join(", ")}`;
          el.appendChild(div);
        });
      });
    });
  });
}

// ================= DASHBOARD =================
function showDue(){
  let el=document.getElementById("cards");
  el.innerHTML="<h3>📌 Dashboard Lernen</h3>";

  let now=Date.now();

  let filter=document.getElementById("tagFilter").value?.toLowerCase();
  let tags=filter ? filter.split(",").map(t=>t.trim()) : null;

  study=[];

  DB.semesters.forEach(s=>{
    (s.modules||[]).forEach(m=>{
      (m.topics||[]).forEach(t=>{
        (t.cards||[]).forEach(c=>{
          let ok = !tags || tags.some(tg => (c.tags||[]).includes(tg));
          if(c.next<=now && ok) study.push(c);
        });
      });
    });
  });

  index=0;
  show();
}

// ================= STUDY =================
function show(){
  let c=study[index];
  if(!c) return;

  document.getElementById("q").innerText=c.q;
  document.getElementById("a").innerText=c.a;
  document.getElementById("a").classList.add("hidden");
}

function showAnswer(){
  document.getElementById("a").classList.remove("hidden");
}

// ================= REVIEW =================
function rate(v){
  let c=study[index];
  if(!c) return;

  c.interval = v===0?1:v===1?Math.max(1,c.interval*2):c.interval*3;
  c.next = Date.now() + c.interval*86400000;

  index++;
  if(index>=study.length) showDue();
  else show();

  save();
}

// ================= INIT =================
render();

</script>

</body>
</html>
